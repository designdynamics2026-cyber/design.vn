      - listitem [ref=e147]:
        - link "Định hình diện mạo trực tuyến cho đội ngũ vận hành homestay đang trên đà bứt phá S.Sens Homes là một chuỗi căn hộ mô hình Short-term Rental (lưu trú ngắn hạn) bắt đầu với một cơ sở tại Hà Nội vào năm 2015. Đến nay hệ thống chuỗi căn hộ của S.Sens đã lên tới con số trên 40 căn hộ, trải rộng khắp 5 thành phố lớn tại Việt Nam. Để S.Sens có thể truyền tải mục tiêu thương hiệu đó là “Thiết kế riêng biệt giúp bạn trải nghiệm nhịp sống thành phố một cách chân thực và thoải mái nhất, nơi lưu giữ những kỷ niệm đẹp trong suốt kỳ nghỉ của bạn” trên môi trường Digital tốt hơn, chúng tôi đã giúp S.Sens định hướng hình ảnh và xây dựng website của mình. Thiết kế website phát triển website thiết kế UI-UX tư vấn thiết kế" [ref=e148] [cursor=pointer]:
