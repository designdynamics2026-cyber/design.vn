<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 50" width="500" height="50">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bbbbbb"/>
    </linearGradient>
  </defs>
  <!-- orange accent dot -->
  <circle cx="7" cy="25" r="5" fill="#e05a2b"/>
  <!-- DESIGN — thin tracked -->
  <text x="22" y="34" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="28" font-weight="200" fill="url(#g)" letter-spacing="6">DESIGN</text>
  <!-- gap divider -->
  <line x1="158" y1="10" x2="158" y2="40" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- DYNAMICS — bold -->
  <text x="168" y="34" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="28" font-weight="800" fill="url(#g)" letter-spacing="1">DYNAMICS</text>
</svg>
